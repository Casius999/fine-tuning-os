# SOTA CI — matrix · SHA-pinned actions · least-privilege · coverage gate >=90%
# Uses pip (not uv) — project has no uv.lock and installs via pip install -e ".[dev]".
# typecheck (mypy) is ADVISORY: continue-on-error=true, excluded from all-green.
# Decision: mypy passes locally with ignore_missing_imports + disable_error_code=[attr-defined,misc,arg-type].
# Including it as advisory so the job runs without blocking the gate.
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group: # required for merge queue

# Deny-all by default; widen per job.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Black format check
        run: black --check .

  typecheck:
    # Advisory: mypy passes locally with lenient config (ignore_missing_imports,
    # disable_error_code=[attr-defined,misc,arg-type]). Not blocking all-green.
    continue-on-error: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Test with coverage gate (>=95%)
        run: pytest --cov=src/fine_tuning_os --cov-report=term-missing --cov-report=xml --cov-fail-under=95
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-24.04' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  gitleaks:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history for secret scanning
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9

  dependency-review:
    # Only meaningful on PRs; compares base..head for vulnerable/badly-licensed deps.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@31c9f175b9cbbdee66d6ab34ed35e2c827f8be10 # v4.7.4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Single required status check the ruleset gates on (set as required in ruleset.json).
  # typecheck excluded because it runs with continue-on-error=true (advisory only).
  all-green:
    if: always()
    needs: [lint, test, gitleaks, dependency-review]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Fail if any needed job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All required checks passed."
