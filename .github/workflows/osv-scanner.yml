# OSV-Scanner — vulnerability scanning for dependencies and source.
# Uses the official OSV-Scanner reusable workflow (scan + SARIF upload to code scanning).
# Runs on push to main, pull requests, and weekly to catch newly-published CVEs.
# Reusable workflow pinned by full commit SHA.
name: OSV-Scanner

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 5 * * 1" # weekly Monday 05:17 UTC

# Deny-all by default; the reusable workflow's job widens per its needs.
permissions: {}

jobs:
  osv-scan:
    # Official reusable workflow performs the scan and uploads SARIF to code scanning.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write # required for SARIF upload to code scanning
    with:
      scan-args: |-
        --recursive
        ./
