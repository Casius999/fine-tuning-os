# Release automation via release-please (PR-gated, Conventional Commits -> SemVer + CHANGELOG).
# Merging the auto-maintained "release PR" tags the release and creates a GitHub Release, which
# then triggers sbom-attest.yml (on: release published).
# Config: release-please-config.json + .release-please-manifest.json at repo root.
name: Release Please

on:
  push:
    branches: ["main"]
  workflow_dispatch: # manual re-trigger (e.g. after adding RELEASE_PLEASE_TOKEN)

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release in flight

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create tags/releases + update CHANGELOG
      pull-requests: write # maintain the release PR
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        # Stays green until RELEASE_PLEASE_TOKEN is set; PR creation requires the PAT
        # (the default GITHUB_TOKEN is not permitted to create pull requests).
        continue-on-error: true
        with:
          # Dedicated PAT (contents:write + pull-requests:write) lets release-please create the
          # release PR and chains downstream workflows (sbom-attest) on the created tag.
          # Falls back to GITHUB_TOKEN until the secret is set (PR creation requires the PAT).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
