# SBOM (syft: CycloneDX + SPDX) + SLSA build-provenance attestation (Sigstore keyless via OIDC).
# Runs on release publication. Consumers verify with:
#   gh attestation verify <artifact> --owner Casius999
name: SBOM & Attest

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build-attest:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # OIDC -> keyless Sigstore signing
      contents: write # attach assets to the release
      attestations: write # record the attestation
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # --- Build Python sdist + wheel ---
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install build frontend
        run: pip install build
      - name: Build distribution
        run: |
          python -m build
          ls -l dist/

      # --- SBOM: CycloneDX (vuln correlation) + SPDX (license/NTIA) ---
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Provenance attestation bound to the built artifacts (SLSA) ---
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

      # --- Attest the SBOMs too (predicate type CycloneDX) ---
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: "dist/*"
          sbom-path: "sbom.cdx.json"

      - name: Attach SBOMs to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cdx.json sbom.spdx.json --clobber
