# OpenSSF Scorecard — security posture scoring; publishes SARIF to the Security tab and powers
# the README badge at api.scorecard.dev.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "31 5 * * 2" # weekly, Tuesday 05:31 UTC
  push:
    branches: ["main"]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # upload SARIF
      id-token: write # publish results to the public OpenSSF API (badge)
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true # enables the README badge via api.scorecard.dev
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@2d92b76c45b91eb80fc44c74ce3fce0ee94e8f9d # v3.30.0
        with:
          sarif_file: results.sarif
