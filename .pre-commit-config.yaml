# pre-commit — cross-language git hooks. Install: `pre-commit install --install-hooks`
# and `pre-commit install --hook-type commit-msg`. Update pins: `pre-commit autoupdate`.
# Revs verified June 2026. Trim hooks to the languages you actually use.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: detect-private-key

  # Python: ruff (lint) + black (format) — project uses both.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: ["--fix"]
        # Note: ruff-format is NOT used here because the project uses black for formatting.

  - repo: https://github.com/psf/black
    rev: 24.12.0
    hooks:
      - id: black
        language_version: python3

  # Secret scanning at commit time (defense-in-depth with CI + push protection).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Conventional Commits enforcement on the commit message.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
